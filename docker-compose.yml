version: "3.9"

services:

  app:
    build: .
    container_name: securecorp_app
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs      # les logs sont persistants sur ta machine
      - ./users.json:/app/users.json
      - ./policies.json:/app/policies.json
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

  mfa_terminal:
    build: .
    container_name: securecorp_mfa
    depends_on:
      - app
    command: python mfa_server.py
    environment:
      - BASE=os.environ.get("BASE_URL", "http://localhost:5000")  # pointe vers le service app dans le réseau Docker
    restart: unless-stopped